name: Build Mod

on:
  push:
    branches: [ 1.20.1 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: ./gradlew build
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: Mod-JAR
          path: build/libs/*.jar
